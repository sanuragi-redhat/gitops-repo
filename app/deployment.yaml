apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/tracking-id: 'application-sise:apps/Deployment:pipeline/sise-deploy'
  name: sise-deploy
  namespace: pipeline
spec:
  replicas: 2
  selector:
    app: sise
    matchLabels: null
  template:
    labels:
      app: sise
    metadata: null
    spec:
      containers:
        - env:
            - name: SIMPLE_SERVICE_VERSION
              value: '0.9'
          image: 'quay.io/openshiftlabs/simpleservice:0.5.0'
          name: sise
          ports:
            - containerPort: 9876
